<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>
<link rel="stylesheet" href="./style.css">

</head>

<body>

<div class="app">

<header>
<h1>My Tasks</h1>
<button class="mode-toggle" onclick="toggleMode()">🌙</button>
</header>

<div class="controls">
<input id="taskInput" placeholder="Add a new task...">
<button onclick="addTask()">Add</button>
</div>

<div class="search">
<span>🔍</span>
<input id="searchInput" placeholder="Search tasks..." oninput="render()">
</div>

<ul id="taskList"></ul>

</div>

<script src="app.js">
</script>

</body>
</html>
