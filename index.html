<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    background: #f4f6fb;
}

.sidebar {
    width: 260px;
    background: #111827;
    color: white;
    padding: 40px 25px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.sidebar h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 20px;
}

.sidebar p {
    font-size: 14px;
    color: #9ca3af;
}

.main {
    flex: 1;
    padding: 50px;
    display: flex;
    flex-direction: column;
}

.top-bar {
    margin-bottom: 30px;
}

.top-bar h2 {
    font-size: 26px;
    color: #111827;
}

.input-section {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
}

.input-section input {
    flex: 1;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 14px;
}

.input-section button {
    padding: 14px 22px;
    border-radius: 8px;
    border: none;
    background: #2563eb;
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
}

.input-section button:hover {
    background: #1d4ed8;
}

ul {
    list-style: none;
    width: 100%;
    max-width: 700px;
}

li {
    background: white;
    padding: 18px 20px;
    margin-bottom: 15px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #e5e7eb;
    transition: 0.2s;
    word-break: break-word;
}

li:hover {
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

li.completed {
    text-decoration: line-through;
    opacity: 0.5;
}

.delete-btn {
    background: #ef4444;
    border: none;
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: 0.3s;
    margin-left: 15px;
}

.delete-btn:hover {
    background: #dc2626;
}

@media (max-width: 1024px) {
    .main {
        padding: 30px;
    }
}

@media (max-width: 768px) {
    body {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        padding: 20px;
    }

    .sidebar div {
        margin-bottom: 0;
    }

    .sidebar p:last-child {
        display: none;
    }

    .main {
        padding: 25px;
    }

    .input-section {
        flex-direction: column;
    }

    .input-section button {
        width: 100%;
    }

    ul {
        max-width: 100%;
    }
}

@media (max-width: 480px) {
    .top-bar h2 {
        font-size: 20px;
    }

    li {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    .delete-btn {
        align-self: flex-end;
    }
}
</style>
</head>
<body>

<div class="sidebar">
    <div>
        <h1>Todo App</h1>
        <p>Organize your tasks efficiently and stay productive.</p>
    </div>
    <p>Simple Task Manager</p>
</div>

<div class="main">
    <div class="top-bar">
        <h2>My Tasks</h2>
    </div>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Add a new task">
        <button onclick="addTask()">Add Task</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
function addTask() {
    const input = document.getElementById("taskInput");
    const taskText = input.value.trim();
    if (taskText === "") return;

    const li = document.createElement("li");
    li.textContent = taskText;

    li.addEventListener("click", function() {
        li.classList.toggle("completed");
    });

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";
    deleteBtn.className = "delete-btn";
    deleteBtn.onclick = function(e) {
        e.stopPropagation();
        li.remove();
    };

    li.appendChild(deleteBtn);
    document.getElementById("taskList").appendChild(li);
    input.value = "";
}
</script>

</body>
</html>
